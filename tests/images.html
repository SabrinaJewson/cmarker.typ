<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <img src="examples/hexagons.png" alt="hexagons" width="32" height="32" style="display: block">
    <p>Image with no alt text:</p>
    <img src="examples/hexagons.png" width="32" height="32" style="display: block">
    <p>Image with alt text:</p>
    <img src="examples/hexagons.png" alt="hexagons" width="32" height="32" style="display: block">
    <p>Image with a relative width of 70%:</p>
    <img src="examples/hexagons.png" width="32" height="32" style="display: block; width: 70%">
    <p>Image with an absolute height of 10pt:</p>
    <img src="examples/hexagons.png" width="32" height="32" style="display: block; height: 10pt">
  </body>
</html>
